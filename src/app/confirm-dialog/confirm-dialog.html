<h2 mat-dialog-title>Delete</h2>
<mat-dialog-content>
    <p>Are you sure you want to delete this task "{{data.taskName}}"?</p>
</mat-dialog-content>
<mat-dialog-actions align ='end'>
    <button mat-button (click) ="onCancel()" type ="button">Cancel</button>
    <button mat-button class ="warn" (click) ="onDelete()">Delete</button>
</mat-dialog-actions>
