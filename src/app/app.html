<div class ="container">
  <mat-card appearance="raised" class ="example-card" style ="max-width: 300px;">
    <mat-card-header>
      <div mat-card-avatar class="example-avatar"></div>
      <mat-card-title>Shiba Inu</mat-card-title>
      <mat-card-subtitle>Dog Breed</mat-card-subtitle>
    </mat-card-header>
    <img mat-card-image src="https://material.angular.dev/assets/img/examples/shiba2.jpg" alt="Shiba Inu">
    <mat-card-content>
      <p>
        The Shiba Inu is the smallest of the six original and distinct spitz breeds of dog from Japan.
      </p>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button>LIKE</button>
      <button mat-button>SHARE</button>
    </mat-card-actions>
    <mat-card-footer>
      <p class ="footer-text">Updated 2 mins ago</p>
    </mat-card-footer>
  </mat-card>
</div>
